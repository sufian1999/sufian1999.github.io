<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sufian Ahmad — Mobile Developer</title>
  <meta name="description" content="Mobile developer. Creator of Merge 5 — the 5×5 sliding number puzzle." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06071C;
      --surface:   #0C0E2E;
      --surface2:  #14163E;
      --cyan:      #63CFF8;
      --purple:    #9B6CF5;
      --text:      #DDE2FF;
      --muted:     #8A94CC;
      --border:    rgba(255,255,255,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Ambient glows ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 8%  15%, rgba(99,207,248,0.07)  0%, transparent 70%),
        radial-gradient(ellipse 50% 45% at 92% 88%, rgba(155,108,245,0.09) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Signature: decorative 5×5 tile grid ── */
    .tile-grid {
      position: fixed;
      top: -48px;
      right: -48px;
      display: grid;
      grid-template-columns: repeat(5, 52px);
      grid-template-rows:    repeat(5, 52px);
      gap: 5px;
      transform: rotate(14deg);
      opacity: 0.055;
      pointer-events: none;
      z-index: 0;
    }
    .tc { border-radius: 8px; background: var(--cyan); }
    .tc:nth-child(3n+1) { background: var(--purple); }
    .tc:nth-child(5n+2) { background: rgba(99,207,248,0.6); }
    .tc:nth-child(7n+3) { background: rgba(155,108,245,0.6); }

    /* mirror grid bottom-left */
    .tile-grid-bl {
      position: fixed;
      bottom: -48px;
      left: -48px;
      display: grid;
      grid-template-columns: repeat(5, 52px);
      grid-template-rows:    repeat(5, 52px);
      gap: 5px;
      transform: rotate(-14deg);
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 48px;
      gap: 0;
    }

    /* ── Hero ── */
    .hero { text-align: center; margin-bottom: 52px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .eyebrow::before,
    .eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: rgba(138,148,204,0.35);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.08;
      background: linear-gradient(130deg, var(--cyan) 0%, var(--text) 45%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 14px;
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ── App card ── */
    .app-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow: 0 0 0 1px rgba(99,207,248,0.04), 0 24px 64px rgba(0,0,0,0.4);
    }

    .app-header { display: flex; align-items: center; gap: 18px; }

    .app-icon {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
      border-radius: 18px;
      background: linear-gradient(140deg, #63CFF8 0%, #7B6CF5 60%, #9B6CF5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      box-shadow:
        0 0 20px rgba(99,207,248,0.30),
        0 0 48px rgba(155,108,245,0.18);
    }

    .app-info h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.025em;
    }
    .app-info p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Chips ── */
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }

    .chip {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(99,207,248,0.22);
      background: rgba(99,207,248,0.07);
      color: var(--cyan);
    }

    /* ── Play button ── */
    .play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 22px;
      border-radius: 14px;
      background: linear-gradient(130deg, #63CFF8 0%, #9B6CF5 100%);
      color: #06071C;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .play-btn:hover  { opacity: 0.88; transform: translateY(-2px); }
    .play-btn:active { opacity: 1;    transform: translateY(0); }

    .play-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 440px;
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* ── Links row ── */
    .links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .link:hover { color: var(--text); }
    .link svg { width: 16px; height: 16px; fill: currentColor; opacity: 0.7; }

    /* ── Footer ── */
    footer {
      margin-top: 44px;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.45;
      text-align: center;
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      .tile-grid, .tile-grid-bl { display: none; }
      .app-card { border-radius: 18px; padding: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .play-btn { transition: none; }
    }
  </style>
</head>
<body>

</html>
